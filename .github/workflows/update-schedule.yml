name: Update NWSL Schedule

on:
  schedule:
    - cron: '0 13 * * 1'  # Every Monday at 9 AM EDT (1 PM UTC)
  workflow_dispatch:        # Allow manual runs from the GitHub Actions UI

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch schedule and update index.qmd
        run: python update_schedule.py

      - name: Commit updated index.qmd to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.qmd
          git diff --staged --quiet || git commit -m "chore: auto-update NWSL schedule [skip ci]"
          git push

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
